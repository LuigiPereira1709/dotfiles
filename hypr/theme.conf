#############
### THEME ###
#############
exec = gsettings set org.gnome.desktop.interface icon-theme 'breeze'
exec = gsettings set org.gnome.desktop.interface gtk-theme 'catppuccin-mocha-red-standard+default'
exec = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec-once = waypaper --wallpaper ~/Wallapapers/81d98573-550f-496e-8c49-b6c51c0ce301.gif

general {
  gaps_in = 3
  gaps_out = 8
  border_size = 1
  col.active_border = rgba(b34f6dff) rgba(5e838fff) 45deg
  col.inactive_border = rgba(5e838fff) rgba(4c4862ff) 45deg
  layout = dwindle
  allow_tearing = false
  resize_on_border = true
}
group {
  col.border_active = rgba(b34f6dff) rgba(5e838fff) 45deg
  col.border_inactive = rgba(5e838fff) rgba(4c4862ff) 45deg
}
decoration {
  rounding = 4

  blur{
    enabled = no
  }
  shadow {
    enabled = false
  }
}
