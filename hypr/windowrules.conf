## TAG ##
windowrulev2 = tag +browser, class:(zen)
windowrulev2 = tag +browser, class:(chromium)
windowrulev2 = tag +browser, class:(qutebrowser)
windowrulev2 = tag +discord, class:^(discord) 
windowrulev2 = tag +game_launcher, class:(steam) 
windowrulev2 = tag +game_launcher, class:(hydralauncher) 
windowrulev2 = tag +game_launcher, class:(net.lutris.Lutris) 
windowrulev2 = tag +game_launcher, class:(com.usebottles.bottles) 

## OPACITY ##
windowrulev2 = opacity 0.9, tag:discord
windowrulev2 = opacity 0.92 0.92, tag:browser 
windowrulev2 = opacity 0.9 0.9, tag:game_launcher
windowrulev2 = opacity 0.9 0.9, class:(com.obsproject.Studio)
windowrulev2 = opacity 0.9 0.9, class:(rog-control-center) 
windowrulev2 = opacity 0.9 0.9, class:(nvidia-settings)
windowrulev2 = opacity 0.9 0.9, class:(Spotify) 
windowrulev2 = opacity 0.9, class:(thunar)
windowrulev2 = opacity 0.9 0.9, class:(blueman-manager)
windowrulev2 = opacity 0.9 0.9, class:(org.pulseaudio.pavucontrol)

## Custom Startup ##
windowrule = center, title:yazi
windowrule = float, title:yazi
windowrule = float, class:blueman-manager
windowrule = float, class:pavucontrol 
windowrule = size 400 400, class:blueman-manager
windowrule = size 800 500, title:yazi
windowrule = size 400 400, class:pavucontrol 
